<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Maths</title>
    <!-- Подключение Bootstrap для сетки и готовых компонентов -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome для иконок (включая тонкие версии regular) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        /* Градиентный фон страницы с мягкими переливами */
        body {
            background: linear-gradient(135deg, 
                #fbc2eb 0%,   /* светло-фиолетовый */
                #afdcec 20%,   /* светло-голубой */
                #ccffff 35%,   /* очень светлый голубой */
                #ffffe0 55%,   /* светло-жёлтый */
                #fad0c4 70%,   /* персиковый */
                #ff9a9e 80%,   /* светло-розовый */
                #fbc2eb 90%    /* возврат к фиолетовому */
            );
            background-attachment: fixed; /* фон фиксирован при прокрутке */
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* ===== НАВИГАЦИОННАЯ ПАНЕЛЬ ===== */
        /* Градиент, как просили — такой же, как у футера */
        .navbar {
            background: linear-gradient(120deg, #4a2a7a, #2d3a9e, #b92ead);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 0.4rem 1.5rem;
            min-height: 48px;
        }
        
        /* Бренд слева */
        .navbar-brand {
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }
        
        /* Символ бесконечности */
        .infinity-logo {
            font-size: 1.4rem;
            margin-right: 8px;
            font-weight: bold;
        }
        
        /* ===== КАРТОЧКИ С ТЕМАМИ ===== */
        .card {
            border: none;
            border-radius: 5px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.7); /* полупрозрачный белый для эффекта стекла */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px); /* размытие фона за карточкой */
            transition: all 0.3s ease;
            margin-bottom: 20px;
            height: 100%;
            padding: 0;
        }
        
        .card:hover {
            transform: translateY(-3px); /* лёгкое поднятие при наведении */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.85); /* чуть менее прозрачный */
        }
        
        /* Тело карточки — центрирование содержимого */
        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 180px;
        }
        
        .card-title {
            color: #291545;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
            font-size: 1.1rem;
        }
  
        /* ===== КНОПКИ EXPLORE ===== */
        /* Уменьшены по просьбе пользователя */
        .btn-primary {
            background: linear-gradient(90deg, #9a4bff, #5a7dff, #ff8cc6);
            border: none;
            border-radius: 25px;
            padding: 8px 30px;           /* компактнее */
            font-weight: 500;
            transition: all 0.3s;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;            /* чуть меньше шрифт */
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(154, 75, 255, 0.3);
            min-width: 130px;              /* минимальная ширина */
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(154, 75, 255, 0.4);
            background: linear-gradient(90deg, #8a3bf5, #4a6df5, #f07cb6);
        }
        
        /* ===== ФУТЕР ===== */
        /* Теперь такой же градиент, как у навбара (по просьбе) */
        footer {
            background: linear-gradient(120deg, #4a2a7a, #2d3a9e, #b92ead);
            color: white;
            padding: 25px 0;
            margin-top: 60px;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.1);
        }
        
        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        /* Отступ сверху настроен так, чтобы контент был выше, чем в прошлой версии, но ниже, чем изначально */
        .container.my-5 {
            padding-top: 70px;    /* компромиссное значение */
            padding-bottom: 30px;
        }
        
        /* ===== ЗАГОЛОВОК welcome ===== */
        h1 {
            font-weight: 600;      /* достаточная толщина */
            color: #3d2a5e;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
            font-size: 2.4rem;     /* подобранный размер */
        }
        
        /* Линия под заголовком — теперь на всю ширину текста */
        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;            /* ширина равна ширине текста */
            height: 3px;
            background: linear-gradient(90deg, #ff8c8c, #4a3ce6);
            border-radius: 2px;
        }
        
        /* ===== ИКОНКИ В КАРТОЧКАХ ===== */
        .card-icon {
            color: #4169e1;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        /* Для иконки Machine Learning используем тонкое начертание (regular) */
        .card-icon.fa-chart-line {
            font-weight: 400; /* regular */
        }
        
        /* ===== АДАПТИВНОСТЬ (МЕДИА-ЗАПРОСЫ) ===== */
        @media (max-width: 992px) {
            .col-lg-3 {
                flex: 0 0 50%;
                max-width: 50%;   /* на средних экранах по 2 карточки в ряд */
            }
        }
        
        @media (max-width: 768px) {
            .col-lg-3, .col-md-3 {
                flex: 0 0 100%;
                max-width: 100%;   /* на мобильных по 1 карточке */
            }
            
            h1 {
                font-size: 2.2rem;   /* заголовок чуть меньше */
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- ========== НАВИГАЦИЯ ========== -->
    <!-- Панель с градиентом, бренд слева, пункты меню справа -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <!-- Контейнер без боковых отступов (px-0), чтобы бренд и меню были у краёв -->
        <div class="container px-0">
            <!-- Бренд с отступом слева (ps-3) -->
            <a class="navbar-brand ps-3" href="#">
                <span class="infinity-logo">∞</span>
                <span>Infinite Maths</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Меню с отступом справа (pe-3) и выравниванием вправо (ms-auto) -->
                <ul class="navbar-nav ms-auto pe-3">
                    <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fas fa-home me-1"></i> Home</a></li>
                    <!-- Иконка Machine Learning теперь график (fa-chart-line) -->
                    <li class="nav-item"><a class="nav-link" href="machine_learning.html"><i class="fas fa-chart-line me-1"></i> Machine Learning</a></li>
                    <li class="nav-item"><a class="nav-link" href="binomial.html"><span style="font-family: 'Cambria Math', serif;">∫</span><i class="fas me-1"></i> Calculus</a></li>
                    <li class="nav-item"><a class="nav-link" href="algebra.html"><span style="font-family: 'Cambria Math', serif;">∈</span><i class="fas me-1"></i> Discrete Maths</a></li>
                    <li class="nav-item"><a class="nav-link" href="geometry.html"><i class="fas fa-percent me-1"></i> Probability Theory</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ========== ОСНОВНОЙ КОНТЕНТ ========== -->
    <div class="container my-5">
        <!-- Заголовок страницы -->
        <h1 class="text-center mb-4">Welcome to Infinite Maths</h1>
        
        <!-- Ряд с четырьмя карточками тем -->
        <div class="row">
            <!-- Карточка Machine Learning -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <!-- Тонкая иконка графика (regular) -->
                            <i class="fas fa-chart-line card-icon"></i>
                        </div>
                        <h5 class="card-title">Machine Learning</h5>
                        <a href="ml.html" class="btn btn-primary">Explore</a>
                    </div>
                </div>
            </div>
            <!-- Карточка Calculus -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <span class="card-icon" style="font-family: 'Cambria Math', serif;">∫</span>
                        </div>
                        <h5 class="card-title">Calculus</h5>
                        <a href="binomial.html" class="btn btn-primary">Explore</a>
                    </div>
                </div>
            </div>
            <!-- Карточка Discrete Maths -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <span class="card-icon" style="font-family: 'Cambria Math', serif;">∈</span>
                        </div>
                        <h5 class="card-title">Discrete Maths</h5>
                        <a href="discretemaths.html" class="btn btn-primary">Explore</a>
                    </div>
                </div>
            </div>
            <!-- Карточка Probability Theory -->
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body text-center">
                        <div class="mb-2">
                            <i class="fa-regular fa-percent card-icon"></i>
                        </div>
                        <h5 class="card-title">Probability Theory</h5>
                        <a href="geometry.html" class="btn btn-primary">Explore</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== ФУТЕР ========== -->
    <!-- Цвет градиента совпадает с навбаром -->
    <footer class="text-center mt-4">
        <div class="container">
            <div class="mb-3">
                <i class="fa-solid fa-infinity fa-2x mb-2"></i>
                <h4>Infinite Maths</h4>
            </div>
            <div class="d-flex justify-content-center align-items-center">
                <a href="https://t.me/Kiara_infinita" class="text-decoration-none d-flex align-items-center" style="color: inherit;">
                    <span class="me-2">by Kiara Infinita | Contact me in Telegram</span>
                    <i class="fa-brands fa-telegram"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- Скрипты Bootstrap для работы навбара и других компонентов -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Небольшой пользовательский скрипт для анимаций -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Плавное появление заголовка
            const header = document.querySelector('h1');
            header.style.opacity = '0';
            
            setTimeout(() => {
                header.style.transition = 'opacity 1s';
                header.style.opacity = '1';
            }, 300);
            
            // Эффект наведения на карточки — изменение прозрачности
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', () => {
                    card.style.background = 'rgba(255, 255, 255, 0.85)';
                });
                
                card.addEventListener('mouseleave', () => {
                    setTimeout(() => {
                        card.style.background = 'rgba(255, 255, 255, 0.7)';
                    }, 300);
                });
            });
        });
    </script>
</body>
</html>
